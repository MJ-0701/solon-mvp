name: SFS Extended Verification

# Manual-only extended checks. Release-blocking CI lives in sfs-pr-check.yml
# and Windows package-channel smoke lives in windows-scoop-smoke.yml.

on:
  workflow_dispatch:
    inputs:
      cross_instance:
        description: "Run Codex/Gemini cross-instance verify with repository secrets"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  posix-run-all:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: run-all unit + smoke tests
        run: |
          bash tests/run-all.sh

  log-masking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sentinel masking verify (no real keys)
        run: |
          unset CODEX_API_KEY GEMINI_API_KEY
          bash tests/test-sfs-log-masking.sh

  cross-instance-verify:
    if: ${{ inputs.cross_instance }}
    runs-on: ubuntu-latest
    needs: posix-run-all
    defaults:
      run:
        shell: bash
    env:
      CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SFS_CROSS_VERIFY_MODE: release
      SFS_CROSS_VERIFY_DRYRUN: "0"
    steps:
      - uses: actions/checkout@v4
      - name: cross-instance verify
        run: |
          bash tests/test-sfs-cross-instance-verify.sh
