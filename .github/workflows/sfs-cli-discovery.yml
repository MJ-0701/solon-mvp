name: SFS CLI Discovery

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/sfs-cli-discovery.yml"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/scripts/install-cli-discovery.*"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/scripts/sfs-doctor.sh"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/templates/codex-skill/**"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/tests/test-cli-discovery-*"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/install.sh"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/install.ps1"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/upgrade.sh"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/upgrade.ps1"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/bin/sfs-scoop-post-install.ps1"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/packaging/homebrew/sfs.rb.template"
  push:
    branches:
      - main
      - "hotfix/sfs-slash-command-discovery"
    paths:
      - ".github/workflows/sfs-cli-discovery.yml"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/scripts/install-cli-discovery.*"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/scripts/sfs-doctor.sh"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/templates/codex-skill/**"
      - "2026-04-19-sfs-v0.4/solon-mvp-dist/tests/test-cli-discovery-*"

jobs:
  macos-bash:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run install-cli-discovery sandbox tests
        shell: bash
        run: |
          cd 2026-04-19-sfs-v0.4/solon-mvp-dist
          chmod +x scripts/install-cli-discovery.sh scripts/sfs-doctor.sh tests/test-cli-discovery-macos.sh
          bash tests/test-cli-discovery-macos.sh
      - name: sfs doctor smoke (no Solon project)
        shell: bash
        run: |
          cd 2026-04-19-sfs-v0.4/solon-mvp-dist
          # Doctor exits 1 when sfs binary not on PATH (or 0 if present); we
          # only assert it does not crash.
          bash scripts/sfs-doctor.sh || true

  ubuntu-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run install-cli-discovery sandbox tests
        shell: bash
        run: |
          cd 2026-04-19-sfs-v0.4/solon-mvp-dist
          chmod +x scripts/install-cli-discovery.sh scripts/sfs-doctor.sh tests/test-cli-discovery-macos.sh
          bash tests/test-cli-discovery-macos.sh

  windows-pwsh:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run install-cli-discovery sandbox tests
        run: |
          Set-Location "2026-04-19-sfs-v0.4/solon-mvp-dist"
          & .\tests\test-cli-discovery-windows.ps1

  windows-end-to-end-scoop:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local release archive and Scoop bucket
        run: |
          $distRel = "2026-04-19-sfs-v0.4/solon-mvp-dist"
          $dist = Join-Path $env:GITHUB_WORKSPACE $distRel
          $version = (Get-Content (Join-Path $dist "VERSION") -First 1).Trim()
          if (-not $version) { throw "VERSION is empty" }

          $extractDir = "solon-product-$version"
          $archive = Join-Path $env:RUNNER_TEMP "sfs-$version.zip"
          git archive --format=zip --output="$archive" --prefix="$extractDir/" "HEAD:$distRel"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $fileUrl = "file:///" + (($archive -replace "\\", "/") -replace " ", "%20")

          $bucket = Join-Path $env:RUNNER_TEMP "solon-scoop-bucket"
          $bucketDir = Join-Path $bucket "bucket"
          New-Item -ItemType Directory -Force -Path $bucketDir | Out-Null

          $template = Get-Content (Join-Path $dist "packaging/scoop/sfs.json.template") -Raw
          $manifest = $template.Replace("__VERSION__", $version)
          $manifest = $manifest.Replace("__URL__", $fileUrl)
          $manifest = $manifest.Replace("__SHA256__", $hash)
          $manifest = $manifest.Replace("__EXTRACT_DIR__", $extractDir)
          Set-Content -Path (Join-Path $bucketDir "sfs.json") -Value $manifest -Encoding UTF8

          git -C $bucket init
          git -C $bucket config user.email "actions@github.com"
          git -C $bucket config user.name "github-actions"
          git -C $bucket add bucket/sfs.json
          git -C $bucket commit -m "test bucket"

          $bucketUrl = "file:///" + (($bucket -replace "\\", "/") -replace " ", "%20")
          "SFS_TEST_BUCKET_URL=$bucketUrl" >> $env:GITHUB_ENV

      - name: Install Scoop
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          "$env:USERPROFILE\scoop\shims" >> $env:GITHUB_PATH

      - name: Install SFS from local bucket (post_install runs cli-discovery)
        run: |
          $env:PATH = "$env:USERPROFILE\scoop\shims;$env:PATH"
          # Suppress project-upgrade hook (no Solon project on the runner)
          $env:SFS_SCOOP_PROJECT_UPGRADE = "0"
          scoop bucket add solon $env:SFS_TEST_BUCKET_URL
          scoop install sfs
          if ($LASTEXITCODE -ne 0) { throw "scoop install failed" }
          sfs version

      - name: Verify cli-discovery side effects
        run: |
          # Codex skill must land at user-global path (claude/gemini not on
          # this runner — those steps are expected to skip gracefully).
          $skill = "$env:USERPROFILE\.codex\skills\sfs\SKILL.md"
          if (-not (Test-Path $skill)) { throw "expected Codex skill missing: $skill" }
          Write-Host "OK: Codex skill at $skill"

      - name: sfs doctor smoke
        run: |
          $env:PATH = "$env:USERPROFILE\scoop\shims;$env:PATH"
          # doctor may exit 1 if claude/gemini missing (expected); only assert
          # it does not crash with exit 2 (sfs binary broken).
          $bash = Join-Path $env:ProgramFiles "Git\bin\bash.exe"
          if (-not (Test-Path $bash)) {
            $bashCommand = Get-Command bash.exe -ErrorAction SilentlyContinue
            if ($bashCommand) { $bash = $bashCommand.Source }
          }
          if (-not $bash) { throw "Git Bash not found" }
          & $bash -lc "sfs doctor"
          $rc = $LASTEXITCODE
          if ($rc -eq 2) { throw "sfs doctor exited with hard failure (rc=2)" }
          Write-Host "sfs doctor exit code: $rc (0=all pass, 1=warnings only)"
