# .sfs-local/divisions.yaml
# Solon MVP minimal divisions config (기본값).
# Solon docset 쪽 divisions.schema.yaml v1.1 와 호환되는 subset.
# 프로젝트 특성에 따라 각 본부 activation_state 를 조정하고, 변경 사유는
# `.sfs-local/decisions/<N>-activate-<division>.md` 에 기록.

version: 1.0-mvp-minimal
project: "agent_architect"
runtime: claude-code   # (향후) codex / gemini-cli 전환 시 값 변경
created: "2026-04-30"
solon_mvp_version: "0.5.17-product"

divisions:
  dev:
    activation_state: active
    lead: "사용자 직접 (self-lead)"
    notes: "구현 주도. D (do) step 의 main owner."

  strategy-pm:
    activation_state: active
    lead: "사용자 직접"
    notes: "brainstorm / plan / review 산출물 owner. P-1 + P + C step."

  qa:
    activation_state: active
    activation_scope: full
    activated_at: "2026-05-01T15:42:59Z"
    activation_reason: "Abstract-only divisions blocked runtime activation; promote core guardrails to executable scope."
    implementation_contract:
      summary: "Owns test strategy, smoke/regression coverage, defect triage, and release confidence."
      outputs:
        - "test matrix"
        - "smoke/regression result"
        - "release confidence notes"
      evidence:
        - "decision file under .sfs-local/decisions/"
        - "events.jsonl division_activated event"
  design:
    activation_state: active
    activation_scope: full
    activated_at: "2026-05-01T15:42:59Z"
    activation_reason: "Abstract-only divisions blocked runtime activation; promote core guardrails to executable scope."
    implementation_contract:
      summary: "Owns UX flow, interaction states, accessibility, responsive fit, and design-system consistency."
      outputs:
        - "user flow + screen/state inventory"
        - "accessibility/responsive checklist"
        - "design-system token/component notes"
      evidence:
        - "decision file under .sfs-local/decisions/"
        - "events.jsonl division_activated event"
  infra:
    activation_state: active
    activation_scope: full
    activated_at: "2026-05-01T15:42:59Z"
    activation_reason: "Abstract-only divisions blocked runtime activation; promote core guardrails to executable scope."
    implementation_contract:
      summary: "Owns secrets, deploy path, observability, rollback, cost, and production readiness."
      outputs:
        - "secret/auth/data risk checklist"
        - "deploy/rollback notes"
        - "monitoring/cost notes"
      evidence:
        - "decision file under .sfs-local/decisions/"
        - "events.jsonl division_activated event"
  taxonomy:
    activation_state: active
    activation_scope: full
    activated_at: "2026-05-01T15:42:59Z"
    activation_reason: "Abstract-only divisions blocked runtime activation; promote core guardrails to executable scope."
    implementation_contract:
      summary: "Owns canonical domain terms, entities, states, naming rules, and drift detection."
      outputs:
        - "canonical terms + forbidden aliases"
        - "entity/state naming map"
        - "drift notes across code/docs/UI"
      evidence:
        - "decision file under .sfs-local/decisions/"
        - "events.jsonl division_activated event"
# Phase 1 MVP 기본 활성 본부는 dev + strategy-pm 이었고,
# 2026-05-02 decision 기록으로 qa/design/infra/taxonomy 도 executable scope 로 승격.
# 승격 기록은 .sfs-local/decisions/<N>-activate-<division>.md 에 남김.
