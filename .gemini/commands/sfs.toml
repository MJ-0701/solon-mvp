# Solon SFS вЂ” Gemini CLI custom command (project-scoped)
#
# Path: <consumer-project>/.gemini/commands/sfs.toml
# Invoke: /sfs <subcommand> [args]
#
# Goal: keep entry tokens low; delegate details to the deterministic bash adapter (`sfs`).

description = "Solon SFS workflow вЂ” dispatch to `sfs` bash adapter SSoT (entry-lean)"

prompt = """
You are operating in a project that has Solon SFS installed (Solo Founder System).

The user invoked `/sfs {{args}}`. Treat the first whitespace-delimited token as
the subcommand and the remainder as that subcommand's arguments.

## Always dispatch first (bash adapter SSoT)

1) Verify runtime: `command -v sfs`. If missing, say so in 1 line and stop.
2) Execute: `sfs <subcommand> <args>`.
   - Vendored layout fallback only: `bash .sfs-local/scripts/sfs-dispatch.sh <subcommand> <args>`.
3) Print stdout verbatim. If exitв‰ 0, also print stderr + `exit <code>`.

If `sfs loop` reports a mutex conflict (Solon `domain_locks`), stop and report the lock owner/domain.

Token-min rule: do not auto-load verbose history (`events.jsonl`, old `scheduled_task_log`, old `review-runs`) unless needed.

## After adapter (only when applicable)

Command modes:
- Bash-first: `status|start|guide|auth|division|upgrade|update|version|commit|loop` в†’ stop after verbatim output.
- Adapter-run: `review` в†’ stop after verbatim output unless explicitly asked to summarize recorded results.
- Hybrid refinement: `adopt|brainstorm|plan|implement|decision|report|retro` and `tidy` (only if it created/touched `report.md`).

Hybrid refinement rules:
- Use adapter stdout (paths) as metadata, then open the created/pointed artifacts and refine them.
- Use each artifactвЂ™s own guardrails (`plan.md`, `implement.md`, etc.) as SSoT for what to write.
- Final user-facing response is a Solon report in a fenced `text` block (localized).
- For `review`: summarize from recorded `review.md`/`result_path` metadata; do not dump raw executor markdown or create a new verdict.

Minimal Solon report shape:
```text
