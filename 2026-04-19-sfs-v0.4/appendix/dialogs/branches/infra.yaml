# status: draft
# last_updated: 2026-04-20
# audience: [implementers, 배포-자동화, 고-트래픽-제품]
#
# depends_on:
#   - dialog/division-activation
#
# defines:
#   - branch/infra-activation
# ---

branch_id: infra
division_id: infra
inherits_from: dialog/division-activation

division_context: |
  infra 본부는 "배포·모니터링·비용·SRE" 를 담당한다.
  - 적합: 트래픽 증가, 배포 파이프라인 필요, 복수 환경 관리, 비용 최적화
  - 비적합 후보: Vercel/Netlify 단일 배포로 충분한 초기 제품, 정적 사이트
  - 1인 창업자 사각지대: "AWS EKS 옮겨야 하지 않을까?" → 대부분 early optimization → 비권장

# =====================================================================
# Phase B
# =====================================================================
phase_B_overrides:
  examples_for_branch: |
    예시:
    - "배포 자동화 필요 (수동 deploy 힘들어)"
    - "DAU 1만 넘어서 Vercel 비용 부담"
    - "복수 환경(dev/stage/prod) 관리 체계"
    - "장애 대응 SRE 체계 필요"
    - "컨테이너로 전환 예정 (Docker/K8s)"
    - "AWS 이전 검토 중"

  intent_classification_hints:
    - label: deployment-automation
      triggers: [배포, deploy, CI/CD, 자동화]
    - label: cost-optimization
      triggers: [비용, 요금, 가격, bill, DAU]
    - label: multi-env-management
      triggers: [환경, stage, prod, env]
    - label: sre-incident-response
      triggers: [장애, SRE, on-call, 모니터링, alert]
    - label: container-migration
      triggers: [컨테이너, Docker, K8s, Kubernetes]
    - label: cloud-migration
      triggers: [AWS, GCP, Azure, 이전, migration, cloud]

# =====================================================================
# Phase C
# =====================================================================
phase_C_overrides:
  intent_based_hint:
    deployment-automation: |
      배포 자동화는 1회성 셋업 성격이므로 temporal 도 적합합니다.
      지속 유지 필요하면 full, 1회 셋업만이면 temporal.
    cost-optimization: |
      비용 최적화는 지속 과제. full 또는 scoped (dev 하위) 모두 가능.
    cloud-migration: |
      이전 프로젝트는 temporal 이 자연스럽습니다. 이전 완료 후 재검토.
    container-migration: |
      컨테이너 전환도 temporal 이 적합. 전환 후 운영 필요하면 재활성화.
    sre-incident-response: |
      SRE 는 지속적 운영 성격이므로 full 을 권장합니다.

  default_hint: |
    infra 는 "규모 도달" 이후 가치가 급증합니다.
    DAU 1만 미만 또는 Vercel/Netlify 로 충분한 단계에서는 비권장 경향이 강합니다.
    다만 배포 복잡도가 이미 높아진 상태라면 활성화 필요.

# =====================================================================
# Phase D
# =====================================================================
phase_D_option_rules:
  option_templates:
    - scope: temporal
      default_intensity: 👍
      label: "temporal (이전·셋업 프로젝트까지)"
      reasoning: "1회성 infra 프로젝트에 적합"

    - scope: full
      default_intensity: ⚪
      label: "full (SRE + 지속 운영)"
      reasoning: "SRE 체계화, 다환경 관리 등 지속 운영 시 적합"

    - scope: scoped
      default_intensity: ⚪
      label: "scoped (dev 본부 하위)"
      reasoning: "배포 자동화만 필요하면 dev 하위 SRE worker 로 충분"

  warn_conditions:
    - pattern: "1인 + DAU < 1000 + Vercel 배포"
      warning: "현재 상황에서 infra 본부는 early optimization 가능성 높음"
      alternatives:
        - "Vercel/Netlify 유지 + uptime monitoring 수동 체크"
        - "dev 본부 내 deployment-worker 하나만 추가 (본부 활성 X)"
        - "이전 시점이 명확해질 때 temporal 로 재검토"

  intent_specific_overrides:
    cloud-migration:
      - scope: temporal
        intensity: 👍
        label: "temporal (이전 완료까지)"
    sre-incident-response:
      - scope: full
        intensity: 👍
        label: "full (SRE 지속 운영)"

# =====================================================================
# Phase E
# =====================================================================
terminal_additions:
  terminal/activate-full:
    extra_side_effects:
      - "cost-estimator evaluator 가 G3 에 wire-in"
      - "memory/infra/runbook.md 초기 템플릿 생성"
      - "L1 event: l1.division.activated { id: infra, scope: full, warn_cost_cap: true }"
  terminal/activate-temporal:
    extra_side_effects:
      - "sunset_at 도달 후 'runbook 을 docs/00-meta/deployment.md 로 보존할까요?' 제안"
  terminal/activate-scoped:
    extra_side_effects:
      - "dev 본부 workers 에 infra-worker-scoped 추가"

# =====================================================================
# 채명정 예시
# =====================================================================
example_scenario:
  persona: "1인 창업자, Vercel 배포, DAU 50, MVP 직전"
  user_need: "향후 AWS 이전 대비 미리 준비"
  recommended_path: "/sfs division activate infra → temporal (사유: 이전 프로젝트 시점에만) 또는 활성화 보류"
  why_recommended: |
    - 현재 Vercel 로 충분 → early optimization 위험
    - 이전 계획이 구체화 (날짜·이유) 되면 temporal 로 활성화
    - 지금 활성화 원한다면 ⚠ 표시 + 수용하되 recommendation_trigger=declined 기록
