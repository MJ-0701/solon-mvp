# .sfs-local/divisions.yaml
# Solon Product minimal divisions config (기본값).
# Solon docset 쪽 divisions.schema.yaml v1.1 와 호환되는 subset.
# 프로젝트 특성에 따라 각 본부 activation_state 를 조정하고, 변경 사유는
# `.sfs-local/decisions/<N>-activate-<division>.md` 에 기록.

version: 1.0-mvp-minimal
project: "<PROJECT-NAME>"
runtime: claude-code   # (향후) codex / gemini-cli 전환 시 값 변경
created: "<DATE>"
solon_mvp_version: "<SOLON-VERSION>"

divisions:
  dev:
    activation_state: active
    lead: "사용자 직접 (self-lead)"
    notes: "구현 주도. D (do) step 의 main owner."

  strategy-pm:
    activation_state: active
    lead: "사용자 직접"
    notes: "brainstorm / plan / review 산출물 owner. P-1 + P + C step."

  qa:
    activation_state: abstract
    reason: "MVP 1 cycle 에서는 manual smoke test 로 대체. cycle 3 누적 후 activate 검토."

  design:
    activation_state: abstract
    reason: "프로젝트의 기존 UI 원칙 또는 컴포넌트 정책을 우선 재사용. 자체 design 본부는 필요 시 activate."

  infra:
    activation_state: abstract
    reason: "배포 플랫폼 (<DEPLOY>) 재사용 가정. 필요 시 cycle 2~3 에서 activate 검토."

  taxonomy:
    activation_state: abstract
    reason: "도메인 taxonomy 는 cycle 2~3 누적 후 도입."

# Phase 1 MVP 기본 활성 본부 = dev + strategy-pm 2 개.
# 나머지 4 개는 abstract — 필요 시 대화에서 선언적으로 activate 승격.
# 승격 기록은 .sfs-local/decisions/<N>-activate-<division>.md 에 남김.
